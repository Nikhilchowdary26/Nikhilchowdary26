name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Compiles your core stats card locally
      - name: Generate Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=nikhilchowdary26&show_icons=true&theme=radical&include_all_commits=true&count_private=true'
          path: profile/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Compiles your language breakdown layout locally
      - name: Generate Top Langs Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=nikhilchowdary26&layout=compact&theme=radical&langs_count=7'
          path: profile/github-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Commits the generated static assets back to your branch
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/github-stats.svg profile/github-langs.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile metrics SVGs via native binary" && git push)
